# =============================================================================
# Servista Service - Reference application.conf (HOCON)
# =============================================================================
#
# Configuration approach:
#   - Single config file per service (no profile-based application-dev.conf, etc.)
#   - All environment differences come from env vars via Kubernetes ConfigMaps/Secrets
#   - Localhost defaults are for local development with Testcontainers
#   - Services extend with their own HOCON sections for service-specific config
#
# Environment variable substitution:
#   - HOCON's ${?VAR} syntax provides the override mechanism
#   - The ? makes the variable optional -- if unset, the default value is used
#   - Kubernetes injects env vars from ConfigMaps and Secrets
#
# CUSTOMIZE for your service:
#   - Update ktor.application.modules with your module function
#   - Update servista.kafka.consumer.group-id to your service name
#   - Add a service-specific HOCON section (see myservice example below)
#   - Remove database or kafka sections if your service doesn't need them
#
# =============================================================================

ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }

    application {
        # Replace with your service's module function
        modules = [com.example.myservice.ApplicationKt.module]
    }
}

servista {

    # --------------------------------------------------------------------------
    # Database configuration
    # --------------------------------------------------------------------------
    # Remove this section entirely if your service doesn't use a database.
    # ServistaConfig loads database as nullable -- missing section is fine.
    database {
        url = "jdbc:postgresql://localhost:5432/myservice"
        url = ${?SERVISTA_DATABASE_URL}

        user = "myservice"
        user = ${?SERVISTA_DATABASE_USER}

        password = "myservice"
        password = ${?SERVISTA_DATABASE_PASSWORD}
    }

    # --------------------------------------------------------------------------
    # Kafka configuration
    # --------------------------------------------------------------------------
    # Remove this section entirely if your service doesn't use Kafka.
    # ServistaConfig loads kafka as nullable -- missing section is fine.
    kafka {
        brokers = "localhost:9092"
        brokers = ${?SERVISTA_KAFKA_BROKERS}

        schema-registry-url = "http://localhost:8081"
        schema-registry-url = ${?SERVISTA_KAFKA_SCHEMA_REGISTRY_URL}

        # Consumer configuration -- only needed if this service consumes events.
        # Remove this sub-section if your service is producer-only.
        consumer {
            # Consumer group ID -- MUST be unique per service.
            # Convention: use the service name as the group ID.
            group-id = "my-service"
            group-id = ${?SERVISTA_KAFKA_CONSUMER_GROUP_ID}

            # Auto offset reset strategy:
            #   "earliest" - process all existing messages (good for new consumers)
            #   "latest"   - only process new messages (good for high-volume topics)
            auto-offset-reset = "earliest"
            auto-offset-reset = ${?SERVISTA_KAFKA_CONSUMER_AUTO_OFFSET_RESET}
        }
    }

    # --------------------------------------------------------------------------
    # Request logging configuration
    # --------------------------------------------------------------------------
    logging {
        requests {
            # Enable/disable request logging (default: true)
            enabled = true
            enabled = ${?SERVISTA_LOG_REQUESTS_ENABLED}

            # Log level for request entries: TRACE, DEBUG, INFO, WARN, ERROR
            level = "INFO"
            level = ${?SERVISTA_LOG_REQUESTS_LEVEL}

            # Paths to exclude from request logging (reduces noise)
            exclude-paths = ["/health"]
        }
    }

    # --------------------------------------------------------------------------
    # Health endpoint configuration
    # --------------------------------------------------------------------------
    # Health endpoints (/health/startup, /health/live, /health/ready) are
    # enabled by default. No special configuration needed in most cases.
    health {
        # Set to false to disable health endpoints (not recommended)
        # enabled = true
    }
}

# =============================================================================
# Service-specific configuration
# =============================================================================
# Add your own HOCON section for service-specific settings.
# Access via Ktor's ApplicationConfig: environment.config.config("myservice")
#
# Example:
#
# myservice {
#     feature-flags {
#         new-dashboard = false
#         new-dashboard = ${?MYSERVICE_FEATURE_NEW_DASHBOARD}
#     }
#
#     external-api {
#         base-url = "https://api.example.com"
#         base-url = ${?MYSERVICE_EXTERNAL_API_URL}
#
#         timeout-ms = 5000
#         timeout-ms = ${?MYSERVICE_EXTERNAL_API_TIMEOUT_MS}
#     }
# }
