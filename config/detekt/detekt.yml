# Local detekt configuration for servista-ktor.
# Overrides shared config from gradle-platform to fix detekt 2.x category renames.
# TODO: Fix the shared config in gradle-platform and remove this override.

comments:
  active: true

complexity:
  active: true

coroutines:
  active: true

empty-blocks:
  active: true

exceptions:
  active: true

naming:
  active: true

performance:
  active: true

potential-bugs:
  active: true

style:
  active: true
  MagicNumber:
    ignoreNumbers:
      - "-1"
      - "0"
      - "1"
      - "2"
    ignoreHashCodeFunction: true
    ignorePropertyDeclaration: true
    ignoreAnnotation: true
    ignoreEnums: true
  MaxLineLength:
    maxLineLength: 120
